<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Plain academic personal website schematic</title>
  <desc id="desc">Wireframe showing a desktop and mobile layout for a professor or PhD style academic website.</desc>
  <rect width="1200" height="760" fill="#f8f8f6"/>
  <text x="70" y="58" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#1d1d1b">Schematic: plain academic / PhD personal site</text>
  <text x="70" y="90" font-family="Arial, sans-serif" font-size="16" fill="#555">Desktop: narrow content column, text-first, simple nav, modest photo. Mobile: single-column stack.</text>

  <g transform="translate(70 135)">
    <text x="0" y="-18" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#333">Desktop</text>
    <rect x="0" y="0" width="760" height="520" fill="#ffffff" stroke="#b9b9b0" stroke-width="2"/>
    <line x1="0" y1="64" x2="760" y2="64" stroke="#d8d8d0"/>
    <text x="28" y="40" font-family="Georgia, serif" font-size="24" font-weight="700" fill="#111">Benjamin Shih</text>
    <text x="520" y="40" font-family="Arial, sans-serif" font-size="14" fill="#555">Home · Research · Background · Contact</text>

    <rect x="28" y="102" width="142" height="166" fill="#ecece6" stroke="#cfcfc7"/>
    <text x="53" y="190" font-family="Arial, sans-serif" font-size="14" fill="#666">photo</text>
    <text x="200" y="122" font-family="Georgia, serif" font-size="30" font-weight="700" fill="#111">Benjamin Shih</text>
    <text x="200" y="154" font-family="Arial, sans-serif" font-size="16" fill="#333">Graduate student, Stanford ICME</text>
    <text x="200" y="184" font-family="Arial, sans-serif" font-size="15" fill="#444">Scientific machine learning, approximation theory,</text>
    <text x="200" y="206" font-family="Arial, sans-serif" font-size="15" fill="#444">and quantitative research.</text>
    <line x1="200" y1="230" x2="680" y2="230" stroke="#e3e3dc"/>
    <text x="200" y="258" font-family="Arial, sans-serif" font-size="14" fill="#7b1e1e">Email · GitHub · LinkedIn · ORCID · Google Scholar</text>

    <text x="28" y="326" font-family="Georgia, serif" font-size="22" font-weight="700" fill="#111">Research</text>
    <text x="28" y="356" font-family="Arial, sans-serif" font-size="15" fill="#444">• Transformers as Neural Operators for Solutions of Differential Equations...</text>
    <text x="28" y="382" font-family="Arial, sans-serif" font-size="15" fill="#444">• Temporal Learning Capacity of Transformers in Non-Markovian Dynamical Systems</text>

    <text x="28" y="432" font-family="Georgia, serif" font-size="22" font-weight="700" fill="#111">Background</text>
    <text x="28" y="462" font-family="Arial, sans-serif" font-size="15" fill="#444">Education · Quantitative research internships · Teaching · CV available upon request</text>
  </g>

  <g transform="translate(900 135)">
    <text x="0" y="-18" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#333">Mobile</text>
    <rect x="0" y="0" width="250" height="520" rx="26" fill="#ffffff" stroke="#b9b9b0" stroke-width="2"/>
    <line x1="0" y1="72" x2="250" y2="72" stroke="#d8d8d0"/>
    <text x="24" y="35" font-family="Georgia, serif" font-size="20" font-weight="700" fill="#111">Benjamin Shih</text>
    <text x="24" y="58" font-family="Arial, sans-serif" font-size="12" fill="#555">Home · Research · More</text>
    <rect x="24" y="102" width="78" height="92" fill="#ecece6" stroke="#cfcfc7"/>
    <text x="43" y="151" font-family="Arial, sans-serif" font-size="12" fill="#666">photo</text>
    <text x="24" y="232" font-family="Georgia, serif" font-size="24" font-weight="700" fill="#111">Benjamin Shih</text>
    <text x="24" y="260" font-family="Arial, sans-serif" font-size="13" fill="#444">Graduate student, Stanford ICME.</text>
    <text x="24" y="282" font-family="Arial, sans-serif" font-size="13" fill="#444">Scientific ML and quant research.</text>
    <line x1="24" y1="310" x2="226" y2="310" stroke="#e3e3dc"/>
    <text x="24" y="346" font-family="Georgia, serif" font-size="19" font-weight="700" fill="#111">Research</text>
    <text x="24" y="374" font-family="Arial, sans-serif" font-size="12" fill="#444">Publication card</text>
    <text x="24" y="398" font-family="Arial, sans-serif" font-size="12" fill="#444">Thesis links</text>
    <text x="24" y="446" font-family="Georgia, serif" font-size="19" font-weight="700" fill="#111">Background</text>
    <text x="24" y="474" font-family="Arial, sans-serif" font-size="12" fill="#444">Timeline becomes stacked list</text>
  </g>
</svg>
